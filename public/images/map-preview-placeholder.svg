  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Simplified Kamchatka peninsula outline -->
  <path d="M350,80 L370,100 L380,140 L375,180 L390,220 L400,260 L395,300 L410,340 L420,380 
