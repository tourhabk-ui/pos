           L375,490 L365,460 L355,430 L340,400 L330,370 L320,340 L315,310 L310,280 L305,250 
           L300,220 L295,190 L300,160 L310,130 L320,110 L330,95 Z" 
        fill="url(#land)" stroke="#3d6b4a" stroke-width="2" opacity="0.8"/>
  <!-- Volcano markers -->
  <circle cx="390" cy="260" r="4" fill="#e74c3c" opacity="0.9"/>
  <circle cx="400" cy="300" r="4" fill="#e74c3c" opacity="0.9"/>
  <circle cx="380" cy="340" r="4" fill="#e74c3c" opacity="0.9"/>
  <circle cx="370" cy="400" r="4" fill="#e74c3c" opacity="0.9"/>
  <circle cx="410" cy="380" r="4" fill="#e74c3c" opacity="0.9"/>
  <circle cx="430" cy="460" r="4" fill="#e74c3c" opacity="0.9"/>
  <circle cx="360" cy="460" r="4" fill="#e74c3c" opacity="0.9"/>
  <!-- Hot springs -->
  <circle cx="395" cy="310" r="3" fill="#f39c12" opacity="0.8"/>
  <circle cx="415" cy="350" r="3" fill="#f39c12" opacity="0.8"/>
  <circle cx="440" cy="500" r="3" fill="#f39c12" opacity="0.8"/>
