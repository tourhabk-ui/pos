name: Cron — Engagement

on:
  schedule:
    - cron: '0 9 * * *'    # каждый день в 09:00 UTC: реэнгейджмент туристов
  workflow_dispatch:

jobs:
  engagement:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Kuzmich — реэнгейджмент туристов
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then echo "CRON_SECRET not set"; exit 0; fi
          HTTP=$(curl -s -o /tmp/out.json -w "%{http_code}" --max-time 60 \
            "https://tourhab.ru/api/cron/engagement?secret=$CRON_SECRET")
          echo "HTTP: $HTTP" && cat /tmp/out.json 2>/dev/null || true
          [ "$HTTP" = "200" ] && echo "OK" || { echo "FAIL $HTTP"; exit 1; }
