name: Cron — Kuzmich Place Reviews

on:
  schedule:
    - cron: '30 22 * * *'  # 22:30 UTC — DeepSeek off-peak window
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate kuzmich_review for places (20 per run)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then echo "CRON_SECRET not set"; exit 0; fi
          HTTP=$(curl -s -o /tmp/out.json -w "%{http_code}" --max-time 600 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://tourhab.ru/api/cron/kuzmich-places")
          echo "HTTP: $HTTP" && cat /tmp/out.json 2>/dev/null || true
          [ "$HTTP" = "200" ] && echo "OK" || { echo "FAIL $HTTP"; exit 1; }
