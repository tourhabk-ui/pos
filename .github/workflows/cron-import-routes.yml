name: Import Route Passports

on:
  schedule:
    # 22:00 UTC — paired with cron-editor (off-peak DeepSeek window)
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      batch:
        description: 'Routes per run (default 20)'
        default: '20'

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Import visitkamchatka.ru route passports
        run: |
          BATCH="${{ github.event.inputs.batch || '20' }}"
          curl -sf \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://tourhab.ru/api/cron/import-routes?batch=${BATCH}" \
            | jq .
