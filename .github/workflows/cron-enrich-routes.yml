name: Cron — Enrich Routes

on:
  schedule:
    - cron: '0 23 * * *'  # 23:00 UTC — DeepSeek off-peak window
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Enrich route descriptions (20 per run)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then echo "CRON_SECRET not set"; exit 0; fi
          HTTP=$(curl -s -o /tmp/out.json -w "%{http_code}" --max-time 300 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://tourhab.ru/api/cron/enrich-routes")
          echo "HTTP: $HTTP" && cat /tmp/out.json 2>/dev/null || true
          [ "$HTTP" = "200" ] && echo "OK" || { echo "FAIL $HTTP"; exit 1; }
