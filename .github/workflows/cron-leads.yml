name: Cron — Lead AI Processing + Follow-ups

# Runs every 30 minutes:
# 1. /api/cron/leads-process — AI-обработка новых лидов
# 2. /api/cron/followups    — follow-up напоминания Day+1/2/5

on:
  schedule:
    - cron: '*/30 * * * *'  # каждые 30 минут: обработка лидов + follow-ups
  workflow_dispatch:          # manual trigger from GitHub Actions UI

jobs:
  process-leads:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger leads processing
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET not set in GitHub secrets — skipping"
            exit 0
          fi

          HTTP=$(curl -s -o /tmp/leads_resp.json -w "%{http_code}" \
            --max-time 120 \
            "https://tourhab.ru/api/cron/leads-process?secret=$CRON_SECRET")

          echo "HTTP: $HTTP"
          cat /tmp/leads_resp.json 2>/dev/null || true

          if [ "$HTTP" = "200" ]; then
            echo "Leads processing OK"
          else
            echo "Unexpected HTTP $HTTP"
            exit 1
          fi

      - name: Trigger follow-up reminders
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then exit 0; fi

          HTTP=$(curl -s -o /tmp/followups_resp.json -w "%{http_code}" \
            --max-time 60 \
            "https://tourhab.ru/api/cron/followups?secret=$CRON_SECRET")

          echo "Follow-ups HTTP: $HTTP"
          cat /tmp/followups_resp.json 2>/dev/null || true
