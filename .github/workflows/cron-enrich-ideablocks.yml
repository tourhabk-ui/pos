name: Cron Enrich IdeaBlocks

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily = 15:00 KMT
  workflow_dispatch:
    inputs:
      batch:
        description: 'Items per run (max 40)'
        default: '25'
      source:
        description: 'places | routes | all'
        default: 'all'

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Enrich IdeaBlocks via Blockify
        run: |
          BATCH="${{ github.event.inputs.batch || '25' }}"
          SOURCE="${{ github.event.inputs.source || 'all' }}"
          curl -X GET "https://tourhab.ru/api/cron/enrich-ideablocks?secret=${{ secrets.CRON_SECRET }}&batch=${BATCH}&source=${SOURCE}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHub-Actions" \
            --max-time 240 \
            --retry 0 \
            --fail \
            --silent \
            --show-error
