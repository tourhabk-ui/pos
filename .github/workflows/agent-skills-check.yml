name: Agent Skills Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

jobs:
  autoskills-dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run autoskills check (dry-run)
        run: npm run ai:skills:check
