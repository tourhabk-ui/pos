name: Cron — Editor

on:
  schedule:
    - cron: '0 22 * * *'  # 22:00 UTC — DeepSeek off-peak window (16:30-00:30 UTC)
  workflow_dispatch:

jobs:
  editor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Editor — AI улучшение описаний туров
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then echo "CRON_SECRET not set"; exit 0; fi
          HTTP=$(curl -s -o /tmp/out.json -w "%{http_code}" --max-time 300 \
            "https://tourhab.ru/api/cron/editor?secret=$CRON_SECRET")
          echo "HTTP: $HTTP" && cat /tmp/out.json 2>/dev/null || true
          [ "$HTTP" = "200" ] && echo "OK" || { echo "FAIL $HTTP"; exit 1; }
